services:
  web:
    image: node:24-alpine
    working_dir: /app
    ports:
      - "${MAGIUM_WEB_PORT:-5173}:5173"
    environment:
      VITE_MAGIUM_API_URL: "/"
      VITE_MAGIUM_TURNSTILE_SITE_KEY: "${VITE_MAGIUM_TURNSTILE_SITE_KEY:-}"
      MAGIUM_DEV_API_PROXY_TARGET: "http://app:8080"
      CHOKIDAR_USEPOLLING: "${CHOKIDAR_USEPOLLING:-true}"
    volumes:
      - .:/app
      - magium_web_node_modules:/app/node_modules
      - magium_web_pnpm_store:/pnpm/store
    command: >
      sh -c "corepack enable
      && corepack prepare pnpm@11.9.0 --activate
      && pnpm install --frozen-lockfile --store-dir /pnpm/store
      && pnpm dev --host 0.0.0.0"
    depends_on:
      app:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: prod
      args:
        VITE_MAGIUM_API_URL: "/"
        VITE_MAGIUM_TURNSTILE_SITE_KEY: "${VITE_MAGIUM_TURNSTILE_SITE_KEY:-}"
    ports:
      - "${MAGIUM_APP_PORT:-8090}:8080"
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER:-magium_translation}:${POSTGRES_PASSWORD:-magium_translation}@postgres:5432/${POSTGRES_DB:-magium_translation}"
      PUBLIC_API_URL: "${MAGIUM_PUBLIC_API_URL:-http://localhost:8090}"
      PUBLIC_WEB_URL: "${MAGIUM_PUBLIC_WEB_URL:-http://localhost:5173}"
      ALLOWED_ORIGIN: "${MAGIUM_ALLOWED_ORIGIN:-http://localhost:5173}"
      ADMIN_TOKEN: "${MAGIUM_ADMIN_TOKEN:-dev-admin-token}"
      ADMIN_PASSWORD: "${MAGIUM_ADMIN_PASSWORD:-dev-admin-password}"
      ADMIN_SESSION_SECRET: "${MAGIUM_ADMIN_SESSION_SECRET:-dev-admin-session-secret}"
      ADMIN_COOKIE_SECURE: "${MAGIUM_ADMIN_COOKIE_SECURE:-0}"
      ADMIN_SESSION_TTL_HOURS: "${MAGIUM_ADMIN_SESSION_TTL_HOURS:-8}"
      TURNSTILE_DISABLED: "${MAGIUM_TURNSTILE_DISABLED:-1}"
      TURNSTILE_SECRET_KEY: "${MAGIUM_TURNSTILE_SECRET_KEY:-}"
      PSEUDONYM_BLOCKLIST: "${MAGIUM_PSEUDONYM_BLOCKLIST:-}"
      SMTP_URL: "${MAGIUM_SMTP_URL:-smtp://mailpit:1025}"
      EMAIL_FROM: "${MAGIUM_EMAIL_FROM:-Magium <no-reply@magium.app>}"
      EMAIL_WEBHOOK_URL: "${MAGIUM_EMAIL_WEBHOOK_URL:-}"
      EMAIL_WEBHOOK_TOKEN: "${MAGIUM_EMAIL_WEBHOOK_TOKEN:-}"
      EMAIL_CONSENT_SECRET: "${MAGIUM_EMAIL_CONSENT_SECRET:-dev-email-consent-secret}"
      GITHUB_TOKEN_FOR_DISPATCH: "${MAGIUM_GITHUB_TOKEN_FOR_DISPATCH:-}"
      GITHUB_REPOSITORY_TARGET: "${MAGIUM_GITHUB_REPOSITORY_TARGET:-}"
      GITHUB_WORKFLOW_FILE: "${MAGIUM_GITHUB_WORKFLOW_FILE:-translation-changeset-pr.yml}"
      GITHUB_REF_NAME: "${MAGIUM_GITHUB_REF_NAME:-main}"
      SESSION_TTL_DAYS: "${MAGIUM_SESSION_TTL_DAYS:-30}"
      AUTH_RATE_LIMIT_WINDOW_MS: "${MAGIUM_AUTH_RATE_LIMIT_WINDOW_MS:-900000}"
      AUTH_RATE_LIMIT_MAX: "${MAGIUM_AUTH_RATE_LIMIT_MAX:-10}"
      MAX_SYNC_BODY_BYTES: "${MAGIUM_MAX_SYNC_BODY_BYTES:-5000000}"
      MAX_SYNC_RECORDS: "${MAGIUM_MAX_SYNC_RECORDS:-500}"
      TRUST_PROXY: "${MAGIUM_TRUST_PROXY:-0}"
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started

  postgres:
    image: postgres:18-alpine
    ports:
      - "${MAGIUM_POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-magium_translation}"
      POSTGRES_USER: "${POSTGRES_USER:-magium_translation}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-magium_translation}"
    volumes:
      - magium_postgres18_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "${MAGIUM_MAILPIT_WEB_PORT:-8025}:8025"

volumes:
  magium_web_node_modules:
  magium_web_pnpm_store:
  magium_postgres18_data:
